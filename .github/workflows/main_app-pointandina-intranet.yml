name: Build and deploy Node.js app to Azure Web App - app-pointandina-intranet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build client + server
        run: npm run build:azure

      - name: Install server production dependencies
        run: cd server && npm install --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            package.json
            package-lock.json
            server/dist
            server/node_modules
            client/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_773C2DE667E74AC7A49B8BA3F2A4E9D7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_11F47D93FA5443F38BEFC37ADBE78C8C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBD3F728D16D4476B05AA08829D85282 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-pointandina-intranet'
          slot-name: 'Production'
          package: .
