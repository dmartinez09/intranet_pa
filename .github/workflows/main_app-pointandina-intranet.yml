name: Build and deploy Node.js app to Azure Web App - app-pointandina-intranet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build client (vite)
        working-directory: client
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Build server (tsc)
        working-directory: server
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install server production deps only
        working-directory: server
        run: |
          rm -rf node_modules
          npm install --omit=dev --no-audit --no-fund

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/server
          mkdir -p deploy/client
          cp -r server/dist deploy/server/dist
          cp -r server/node_modules deploy/server/node_modules
          cp server/package.json deploy/server/package.json
          cp -r client/dist deploy/client/dist
          cat > deploy/package.json << 'EOF'
          {
            "name": "intranet-point-andina",
            "version": "1.0.0",
            "private": true,
            "scripts": {
              "start": "node server/dist/index.js"
            },
            "engines": { "node": ">=20.0.0" }
          }
          EOF

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_773C2DE667E74AC7A49B8BA3F2A4E9D7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_11F47D93FA5443F38BEFC37ADBE78C8C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBD3F728D16D4476B05AA08829D85282 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-pointandina-intranet'
          slot-name: 'Production'
          package: deploy
